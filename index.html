<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bescherming Aardbeienrassen Wereldwijd</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  header p { font-size: 14px; color: #666; margin-top: 4px; }
  .top-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  select { padding: 8px 12px; border: 1px solid #d0d0cc; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; min-width: 200px; cursor: pointer; outline: none; }
  select:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #666; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .map-wrap { background: #e8f4fd; border-radius: 12px; overflow: hidden; border: 1px solid #d0d0cc; }
  svg#map { width: 100%; height: auto; display: block; }
  .country { cursor: pointer; stroke: #fff; stroke-width: 0.5; transition: opacity .15s, fill .2s; }
  .country.normal { fill: #B5D4F4; }
  .country.highlighted { fill: #185FA5; }
  .country.eu { fill: #378ADD; }
  .country.eu.highlighted { fill: #0C447C; }
  .country:hover { opacity: 0.75; }
  .info-panel { background: #fff; border: 1px solid #d0d0cc; border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 1rem; min-height: 90px; }
  .info-panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
  .info-panel .hint { font-size: 13px; color: #888; }
  .tag { display: inline-block; background: #e6f1fb; color: #185FA5; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; margin: 3px 3px 3px 0; }
  .section-label { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .reset-btn { padding: 8px 16px; border: 1px solid #d0d0cc; border-radius: 8px; font-size: 13px; background: #fff; color: #444; cursor: pointer; }
  .reset-btn:hover { background: #f0f0ee; }
  footer { margin-top: 2rem; font-size: 12px; color: #aaa; text-align: center; }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>🍓 Bescherming Aardbeienrassen Wereldwijd</h1>
    <p>Selecteer een ras of klik op een land om te zien waar rassen beschermd zijn.</p>
  </header>

  <div class="top-bar">
    <select id="ras-select">
      <option value="">— Selecteer een ras —</option>
    </select>
    <button class="reset-btn" onclick="reset()">Wis selectie</button>
    <div class="legend">
      <div class="leg-item"><div class="dot" style="background:#185FA5"></div>Beschermd</div>
      <div class="leg-item"><div class="dot" style="background:#B5D4F4"></div>Niet beschermd</div>
      <div class="leg-item"><div class="dot" style="background:#378ADD"></div>EU-lidstaten</div>
    </div>
  </div>

  <div class="map-wrap">
    <svg id="map" viewBox="0 0 1010 570" xmlns="http://www.w3.org/2000/svg">
      <!-- Oceaan labels -->
      <text x="700" y="200" font-size="13" fill="#a8cfe8" font-family="sans-serif" opacity="0.7">Stille Oceaan</text>
      <text x="310" y="310" font-size="13" fill="#a8cfe8" font-family="sans-serif" opacity="0.7">Atlantische Oceaan</text>
      <text x="640" y="340" font-size="11" fill="#a8cfe8" font-family="sans-serif" opacity="0.7">Indische Oceaan</text>

      <!-- Canada -->
      <path class="country normal" id="c-canada" data-name="CANADA"
        d="M80,95 L245,88 L252,145 L232,172 L78,178 Z"/>
      <!-- USA -->
      <path class="country normal" id="c-usa" data-name="AMERIKA (USA)"
        d="M82,182 L228,176 L235,215 L218,246 L178,258 L138,252 L98,248 L76,228 Z"/>
      <!-- Mexico -->
      <path class="country normal" id="c-mexico" data-name="MEXICO"
        d="M102,262 L192,257 L202,293 L162,313 L122,298 Z"/>
      <!-- Engeland -->
      <path class="country normal" id="c-engeland" data-name="ENGELAND"
        d="M438,122 L458,118 L463,152 L446,158 L435,145 Z"/>
      <!-- Noorwegen -->
      <path class="country normal" id="c-noorwegen" data-name="NOORWEGEN"
        d="M468,72 L514,68 L522,112 L492,122 L463,112 Z"/>
      <!-- EU blok -->
      <path class="country eu normal" id="c-eu" data-name="EUROPESE UNIE"
        d="M452,138 L572,128 L592,202 L572,244 L492,254 L456,232 L448,192 Z"/>
      <!-- Zwitserland -->
      <path class="country normal" id="c-zwitserland" data-name="ZWITSERLAND"
        d="M486,192 L512,189 L514,212 L488,214 Z"/>
      <!-- Polen -->
      <path class="country normal" id="c-polen" data-name="POLEN"
        d="M524,138 L562,135 L564,164 L526,166 Z"/>
      <!-- Servie -->
      <path class="country normal" id="c-servie" data-name="SERVIE"
        d="M534,182 L560,180 L562,204 L536,206 Z"/>
      <!-- Turkije -->
      <path class="country normal" id="c-turkije" data-name="TURKIJE"
        d="M572,188 L645,183 L648,218 L574,222 Z"/>
      <!-- Tunesie -->
      <path class="country normal" id="c-tunesie" data-name="TUNESIE"
        d="M488,258 L512,256 L514,296 L490,298 Z"/>
      <!-- Marokko -->
      <path class="country normal" id="c-marokko" data-name="MAROKKO"
        d="M434,268 L482,263 L484,312 L436,314 Z"/>
      <!-- Egypte -->
      <path class="country normal" id="c-egypte" data-name="EGYPTE"
        d="M544,262 L592,259 L594,302 L546,305 Z"/>
      <!-- Jordanie -->
      <path class="country normal" id="c-jordanie" data-name="JORDANIE"
        d="M594,265 L618,262 L620,294 L596,296 Z"/>
      <!-- Zuid Afrika -->
      <path class="country normal" id="c-zuidafrika" data-name="ZUID AFRIKA"
        d="M533,388 L592,383 L594,438 L535,440 Z"/>
      <!-- Australie -->
      <path class="country normal" id="c-australie" data-name="AUSTRALIE"
        d="M778,338 L892,332 L897,422 L780,425 Z"/>

      <!-- Landlabels -->
      <text x="155" y="138" font-size="10" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Canada</text>
      <text x="155" y="220" font-size="10" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Amerika (VS)</text>
      <text x="148" y="283" font-size="9" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Mexico</text>
      <text x="448" y="140" font-size="8" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">UK</text>
      <text x="492" y="95" font-size="9" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Noorwegen</text>
      <text x="522" y="196" font-size="10" fill="#fff" font-family="sans-serif" text-anchor="middle" pointer-events="none">EU</text>
      <text x="500" y="205" font-size="7" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Zwitserl.</text>
      <text x="544" y="153" font-size="7" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Polen</text>
      <text x="548" y="195" font-size="7" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Servië</text>
      <text x="609" y="204" font-size="9" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Turkije</text>
      <text x="501" y="280" font-size="7" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Tunesie</text>
      <text x="459" y="291" font-size="8" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Marokko</text>
      <text x="569" y="285" font-size="9" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Egypte</text>
      <text x="607" y="281" font-size="7" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Jordanië</text>
      <text x="563" y="415" font-size="8" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Zuid-Afrika</text>
      <text x="836" y="382" font-size="10" fill="#0C447C" font-family="sans-serif" text-anchor="middle" pointer-events="none">Australië</text>
    </svg>
  </div>

  <div class="info-panel" id="info-panel">
    <p class="hint">Selecteer een ras uit de lijst of klik op een land op de kaart.</p>
  </div>

  <footer>Bescherming aardbeienrassen &mdash; alle rechten voorbehouden</footer>
</div>

<script>
const data = [
  {ras:"ALLEGRO", landen:["AMERIKA (USA)","CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN"]},
  {ras:"BACHATA", landen:["AMERIKA (USA)","EGYPTE","EUROPESE UNIE","MAROKKO","MEXICO","TUNESIE","TURKIJE"]},
  {ras:"BALADA", landen:["EUROPESE UNIE"]},
  {ras:"CADENZA", landen:["AMERIKA (USA)","CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN","ZWITSERLAND"]},
  {ras:"CALINDA", landen:["AMERIKA (USA)","CANADA","EGYPTE","ENGELAND","EUROPESE UNIE","MAROKKO","MEXICO","TURKIJE"]},
  {ras:"FANDANGO", landen:["AMERIKA (USA)","AUSTRALIE","CANADA","EGYPTE","ENGELAND","EUROPESE UNIE","JORDANIE","MAROKKO","MEXICO","NOORWEGEN","TUNESIE","TURKIJE","ZUID AFRIKA","ZWITSERLAND"]},
  {ras:"FF24S45", landen:["EUROPESE UNIE"]},
  {ras:"FF24S48", landen:["EUROPESE UNIE"]},
  {ras:"FI1309", landen:["POLEN"]},
  {ras:"JENKKA", landen:["EUROPESE UNIE","ZWITSERLAND"]},
  {ras:"OPERA", landen:["ENGELAND","EUROPESE UNIE","ZWITSERLAND"]},
  {ras:"PARLANDO", landen:["CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN","ZWITSERLAND"]},
  {ras:"RAVELLIA", landen:["AMERIKA (USA)","CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN","ZWITSERLAND"]},
  {ras:"RUMBA", landen:["ENGELAND","EUROPESE UNIE","NOORWEGEN","POLEN","SERVIE"]},
  {ras:"SALSA", landen:["EUROPESE UNIE"]},
  {ras:"SONATA", landen:["CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN","POLEN","ZWITSERLAND"]},
  {ras:"TWIST", landen:["AMERIKA (USA)","CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN","SERVIE","ZWITSERLAND"]},
  {ras:"VERDI", landen:["AMERIKA (USA)","CANADA","ENGELAND","EUROPESE UNIE","NOORWEGEN","SERVIE","ZWITSERLAND"]},
  {ras:"YAMBU (RUMBA)", landen:["AMERIKA (USA)","CANADA"]}
];

const countryMap = {
  "AMERIKA (USA)":"c-usa","CANADA":"c-canada","MEXICO":"c-mexico",
  "ENGELAND":"c-engeland","EUROPESE UNIE":"c-eu","NOORWEGEN":"c-noorwegen",
  "ZWITSERLAND":"c-zwitserland","TURKIJE":"c-turkije","EGYPTE":"c-egypte",
  "JORDANIE":"c-jordanie","TUNESIE":"c-tunesie","MAROKKO":"c-marokko",
  "ZUID AFRIKA":"c-zuidafrika","AUSTRALIE":"c-australie","POLEN":"c-polen","SERVIE":"c-servie"
};

const displayNames = {
  "AMERIKA (USA)":"Amerika (VS)","CANADA":"Canada","MEXICO":"Mexico",
  "ENGELAND":"Engeland","EUROPESE UNIE":"Europese Unie","NOORWEGEN":"Noorwegen",
  "ZWITSERLAND":"Zwitserland","TURKIJE":"Turkije","EGYPTE":"Egypte",
  "JORDANIE":"Jordanië","TUNESIE":"Tunesië","MAROKKO":"Marokko",
  "ZUID AFRIKA":"Zuid-Afrika","AUSTRALIE":"Australië","POLEN":"Polen","SERVIE":"Servië"
};

const sel = document.getElementById('ras-select');
const panel = document.getElementById('info-panel');

data.forEach(d => {
  const o = document.createElement('option');
  o.value = d.ras; o.textContent = d.ras;
  sel.appendChild(o);
});

function clearHighlights() {
  document.querySelectorAll('.country').forEach(el => el.classList.remove('highlighted'));
}

function highlightCountries(landen) {
  clearHighlights();
  landen.forEach(l => {
    const key = l.replace(/ \(.*\)/g,'').trim();
    const id = countryMap[key] || countryMap[l];
    if (id) { const el = document.getElementById(id); if (el) el.classList.add('highlighted'); }
  });
}

function showRasInfo(rasName) {
  const r = data.find(d => d.ras === rasName);
  if (!r) return;
  highlightCountries(r.landen);
  const tags = r.landen.map(l => {
    const k = l.replace(/ \(.*\)/g,'').trim();
    return `<span class="tag">${displayNames[k] || l}</span>`;
  }).join('');
  panel.innerHTML = `<h3>Ras: ${r.ras}</h3><div class="section-label">Beschermd in ${r.landen.length} regio('s)</div><div style="margin-top:8px">${tags}</div>`;
}

function reset() {
  sel.value = '';
  clearHighlights();
  panel.innerHTML = '<p class="hint">Selecteer een ras uit de lijst of klik op een land op de kaart.</p>';
}

sel.addEventListener('change', () => { if (sel.value) showRasInfo(sel.value); else reset(); });

document.querySelectorAll('.country').forEach(el => {
  el.addEventListener('click', () => {
    const name = el.dataset.name;
    const key = name.replace(/ \(.*\)/g,'').trim();
    const matches = data.filter(d => d.landen.some(l => l.replace(/ \(.*\)/g,'').trim() === key || l === name));
    sel.value = '';
    clearHighlights();
    el.classList.add('highlighted');
    const display = displayNames[key] || name;
    if (matches.length === 0) {
      panel.innerHTML = `<h3>${display}</h3><p class="hint">Geen rassen beschermd in deze regio.</p>`;
    } else {
      const tags = matches.map(r => `<span class="tag">${r.ras}</span>`).join('');
      panel.innerHTML = `<h3>${display}</h3><div class="section-label">${matches.length} ras(sen) beschermd</div><div style="margin-top:8px">${tags}</div>`;
    }
  });
});
</script>
</body>
</html>
